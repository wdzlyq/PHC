# if given, will override the device setting in gym. 
task: HumanoidIm
project_name: "PHC"
notes:  ""
motion_file: ""
num_envs: 3072
env_spacing: 5
episode_length: 300
is_flag_run: False
enable_debug_vis: False

fut_tracks: False
self_obs_v: 1
obs_v: 6
auto_pmcp: False
auto_pmcp_soft: True

cycle_motion: False
hard_negative: False
min_length: 5

kp_scale: 1
power_reward: True

# === AAA W5: C+ step_width-only canary（默认关闭，保持 W4 零回归）===
# 为什么：W4 α=-0.3 后 sweep 仍 flat，根因是 slider↔motion 混淆；C+ 训练时采样反事实 target slider，
#   并用在线 step_width 物理指标 reward 直接锚定 target。
# 做什么：第一版只开 step_width 维；其他维度保持 origin slider。云端 canary 用 env.aaa_cplus_enable=True 开启。
aaa_cplus_enable: False
aaa_cplus_dim: "step_width"
aaa_cplus_target_range: 0.2
aaa_cplus_style_reward_w: 0.0
aaa_cplus_step_beta: 10.0
aaa_cplus_signed_style_scale: 10.0
aaa_cplus_signed_style_clip: 1.0
aaa_cplus_direction_reward_w: 0.0
aaa_cplus_direction_scale: 0.2
aaa_cplus_origin_mode: label          # AAA Step7-fix: label(零回归旧逻辑)/ema(online 量纲重校)
aaa_cplus_step_norm_ema_momentum: 0.99
aaa_cplus_step_target_amp: 0.15       # online 量纲目标幅度: target_metric=origin+(target_slider-origin_slider)*amp
aaa_cplus_step_p10: 0.15
aaa_cplus_step_p90: 0.45
aaa_cplus_step_axis: 0
aaa_cplus_step_width_bodies: ["L_Ankle", "R_Ankle"]
# === AAA end ===

shape_resampling_interval: 500

control_mode: "isaac_pd"
power_scale: 1.0
controlFrequencyInv: 2 # 30 Hz
stateInit: "Random"  
hybridInitProb: 0.5
numAMPObsSteps: 10

local_root_obs: True
root_height_obs: True
key_bodies: ["R_Ankle", "L_Ankle", "R_Wrist",  "L_Wrist"]
contact_bodies: ["R_Ankle", "L_Ankle", "R_Toe", "L_Toe"]
reset_bodies: ['Pelvis', 'L_Hip', 'L_Knee', 'R_Hip', 'R_Knee', 'Torso', 'Spine', 'Chest', 'Neck', 'Head', 'L_Thorax', 'L_Shoulder', 'L_Elbow', 'L_Wrist', 'L_Hand', 'R_Thorax', 'R_Shoulder', 'R_Elbow', 'R_Wrist', 'R_Hand']
terminationHeight: 0.15
enableEarlyTermination: True
terminationDistance: 0.25

### Fut config
numTrajSamples: 3
trajSampleTimestepInv: 3
enableTaskObs: True


plane:
  staticFriction: 1.0
  dynamicFriction: 1.0
  restitution: 0.0
