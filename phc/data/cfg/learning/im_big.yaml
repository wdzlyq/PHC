params:
  seed: 0

  algo:
    name: im_amp

  model:
    name: amp

  network:
    name: amp
    separate: True
    # === AAA Step C: structured scalar residual path（默认关闭，零回归）===
    # 只学习 f(obs, slider)->scalar，再投到 Step B 验证过的 D2_axis0 方向。
    aaa_structured_step_enabled: False
    aaa_structured_disable_raw_residual: False
    aaa_structured_amp: 0.1

    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: -2.9
        fixed_sigma: True
        learn_sigma: False

    mlp:
      units: [2048, 1536, 1024, 1024, 512, 512] # comparable paramter to z_big_task
      activation: silu
      d2rl: False

      initializer:
        name: default
      regularizer:
        name: None

    disc:
      # units: [2048, 1024, 512]
      # activation: silu
      
      units: [1024, 512]
      activation: relu
      

      initializer:
        name: default

  load_checkpoint: False

  config:
    name: Humanoid
    env_name: rlgpu
    multi_gpu: False
    ppo: True
    mixed_precision: False
    normalize_input: True
    normalize_value: True
    reward_shaper:
      scale_value: 1
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 2e-5
    lr_schedule: constant
    score_to_win: 20000
    max_epochs: 10000000
    save_best_after: 100
    save_frequency: 1500
    print_stats: False
    save_intermediate: True
    entropy_coef: 0.0
    truncate_grads: True
    grad_norm: 50.0
    e_clip: 0.2
    horizon_length: 32
    minibatch_size: 16384
    mini_epochs: 6
    critic_coef: 5
    clip_value: False
    
    bounds_loss_coef: 10
    amp_obs_demo_buffer_size: 200000
    amp_replay_buffer_size: 200000
    amp_replay_keep_prob: 0.01
    amp_batch_size: 512
    amp_minibatch_size: 4096
    disc_coef: 5
    disc_logit_reg: 0.01
    disc_grad_penalty: 5
    disc_reward_scale: 2
    disc_weight_decay: 0.0001
    normalize_amp_input: True

    task_reward_w: 0.5  # AAA 方案A v2: content 0.5（保 tracking，抉择2）；disc 改 conditional 后 disc_reward_w 即 w_style
    disc_reward_w: 0.5  # AAA 方案A v2: 风格 reward 权重 0.3→0.5（增强 disc 杠杆力③，探针定因后）
    res_lambda: 0.0     # AAA 方案A v2: 去掉 residual norm 惩罚力①（探针证它本就 tiny 且压制 α；tanh 硬界已足够 bounded）

    # === AAA W5: C+ canary 学习侧记录项（env 侧同名配置才实际驱动 reward）===
    # 为什么：C+ 主监督是 env._compute_reward 的 step_width metric reward；这里保留默认关闭/0权重，
    #   方便训练命令统一 override 与实验记录，避免误以为 conditional disc 仍是主风格项。
    aaa_cplus_enable: False
    aaa_cplus_style_reward_w: 0.0
    aaa_cplus_target_range: 0.2
    aaa_cplus_signed_style_scale: 10.0
    aaa_cplus_signed_style_clip: 1.0
    aaa_cplus_direction_reward_w: 0.0
    aaa_cplus_direction_scale: 0.2
    aaa_cplus_origin_mode: label          # AAA Step7-fix: label(零回归旧逻辑)/ema(online 量纲重校)
    aaa_cplus_step_norm_ema_momentum: 0.99
    aaa_cplus_step_target_amp: 0.15       # online 量纲目标幅度: target_metric=origin+(target_slider-origin_slider)*amp
    # === AAA end ===

    # === AAA W5: step_width-only 修正计划 loss 开关（默认关闭，零回归）===
    # 为什么：C+ reward-shaping-only 失败后，下一轮需要两条更强信号：
    #   1) style-specific PPO advantage，避免 r_style 被 content/disc 淹没；
    #   2) residual contrast loss，直接强制 adapter 对 slider 敏感。
    # 做什么：默认 0 不改变旧实验；canary 时命令行 override。
    aaa_style_adv_coef: 0.0
    aaa_contrast_coef: 0.0
    aaa_contrast_delta_coef: 0.0
    aaa_contrast_kl_coef: 0.0
    aaa_contrast_alpha_floor: 0.1
    aaa_contrast_dim: 1  # 0=energy, 1=step_width, 2=elbow_bend
    # === AAA W5 P2: learned differentiable step_width proxy（默认关闭，零回归）===
    # train_coef 只训练 g(obs, action)->step_width_norm；dir_coef 把单调方向 loss 接入 actor。
    aaa_proxy_train_coef: 0.0
    aaa_proxy_dir_coef: 0.0
    aaa_proxy_lr: 0.001
    aaa_proxy_hidden: 256
    aaa_proxy_margin: 0.01
    aaa_proxy_grad_clip: 1.0
    aaa_proxy_dir_warmup_epochs: 0
    # === AAA W5 P2b: analytic/action-space step_width proxy（默认关闭，零回归）===
    aaa_joint_step_coef: 0.0
    aaa_joint_step_margin: 0.05
    aaa_joint_step_left_idx: 0     # SMPL L_Hip_x
    aaa_joint_step_right_idx: 12   # SMPL R_Hip_x
    aaa_joint_step_left_sign: 1.0
    aaa_joint_step_right_sign: -1.0
    # === AAA Step C: structured scalar head supervision（默认关闭，零回归）===
    aaa_structured_step_coef: 0.0
    aaa_structured_step_margin: 0.05
    aaa_structured_step_amp: 0.1
    # === AAA Step C3: g_local dense surrogate（默认全关，零回归；上云用 +learning.params.config.aaa_g_local_* override）===
    aaa_g_local_coef: 0.0
    aaa_g_local_margin: 0.03        # 初始小于 C2 target margin 0.05，避免过强（plan §686）
    aaa_g_local_path: ""            # 指向 g_local_mlp.pt（obs_delta 版）
    aaa_g_local_feature_mode: obs_delta
    aaa_g_local_grad_clip: 0.0      # 默认不单独裁剪，先看 grad audit
    # === AAA end ===

    player:
        games_num: 50000000
